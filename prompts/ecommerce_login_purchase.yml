version: "1.0"
description: "E-commerce login and purchase flow"
platform: "ios"
device_name: "iPhone 16"
bundle_id: "com.Imen.ecommerceApp"

# Screen-based workflow - prompts grouped by screen
workflow:
  LoginScreen:
    - Find the email field and tap it
    - Type youcanautomate@gmail.com in the email field
    - Find the password field and tap it
    - Type Test123 in the password field
    - Find the Sign In button and tap it
  
  HomeScreen:
    - Wait for 2 seconds for the home page to load
    - Find the element which contains text "Crew Neck" and tap it

  
  ProductDetailsScreen:
    - Find the size selector button that contains "M" and tap it
    - Find the Add to Cart button below the product details and tap it
    - Find the OK button on the confirmation popup and tap it
    - Wait for 1 second then take a final screenshot
  